<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorización LU y Resolución de Sistemas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b66;
            --accent: #06b6d4;
            --accent-hover: #0891b2;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #f1f5f9;
        }
        .font-mono { font-family: 'Fira Code', monospace; }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .matrix-input {
            transition: all 0.2s ease;
            background: rgba(15, 23, 42, 0.8);
        }
        .matrix-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
            outline: none;
        }
        .step-card {
            border-left: 2px solid #334155;
            transition: all 0.3s ease;
        }
        .step-card:hover {
            border-left-color: var(--accent);
            background: rgba(30, 41, 59, 0.4);
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col lg:flex-row items-center justify-between mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="bg-gradient-to-br from-cyan-500 to-blue-600 p-3 rounded-2xl shadow-xl shadow-cyan-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tight italic uppercase text-white">LU Matrix <span class="text-cyan-400">Lab</span></h1>
                    <p class="text-slate-400 text-xs font-medium tracking-widest uppercase">Factorización LU y Resolución de Sistemas</p>
                </div>
            </div>

            <div class="flex flex-wrap items-center justify-center gap-4 bg-slate-800/50 p-3 rounded-2xl border border-slate-700/50">
                <div class="flex items-center gap-3 px-3 border-r border-slate-700">
                    <span class="text-[10px] font-black text-slate-500 uppercase">Orden (n):</span>
                    <input type="number" id="matrixSize" min="2" max="10" value="3" 
                        class="w-12 bg-slate-900 border border-slate-700 rounded-lg text-center font-bold text-cyan-400 focus:outline-none focus:ring-1 ring-cyan-500">
                </div>
                <div class="flex gap-1" id="methodSelectors">
                    <button onclick="setMethod('doolittle')" id="btn-doolittle" class="method-btn px-4 py-1.5 rounded-xl text-[10px] font-black uppercase transition-all bg-cyan-500 text-white">Doolittle</button>
                    <button onclick="setMethod('crout')" id="btn-crout" class="method-btn px-4 py-1.5 rounded-xl text-[10px] font-black uppercase transition-all text-slate-500 hover:bg-slate-700">Crout</button>
                    <button onclick="setMethod('cholesky')" id="btn-cholesky" class="method-btn px-4 py-1.5 rounded-xl text-[10px] font-black uppercase transition-all text-slate-500 hover:bg-slate-700">Cholesky</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8 items-start">
            
            <!-- Entrada de Datos -->
            <div class="xl:col-span-5 space-y-6">
                <div class="bg-slate-800/40 backdrop-blur-md p-6 md:p-8 rounded-[2rem] border border-slate-700/50 shadow-2xl">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-lg font-bold text-white flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-cyan-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                            Matriz A
                        </h2>
                        <button onclick="resetInputs()" class="text-slate-500 hover:text-red-400 transition-colors p-2 rounded-lg hover:bg-slate-700/50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>

                    <div id="matrixContainer" class="overflow-x-auto pb-4 custom-scrollbar">
                        <!-- Generado por JS -->
                    </div>

                    <h2 class="text-lg font-bold text-white flex items-center gap-2 mt-8 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-cyan-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
                        Vector b
                    </h2>
                    <div id="vectorContainer" class="flex gap-2 overflow-x-auto pb-2 custom-scrollbar">
                        <!-- Generado por JS -->
                    </div>

                    <button onclick="calculate()" class="w-full mt-10 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-500/10 transition-all transform active:scale-[0.98] flex items-center justify-center gap-3 uppercase tracking-widest text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                        Calcular Descomposición
                    </button>

                    <div id="errorMessage" class="hidden mt-6 p-4 bg-red-500/10 border border-red-500/50 rounded-2xl flex items-start gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-red-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        <p id="errorText" class="text-red-200 text-xs font-medium leading-relaxed"></p>
                    </div>
                </div>
            </div>

            <!-- Resultados -->
            <div class="xl:col-span-7">
                <div id="emptyState" class="h-full min-h-[500px] border-2 border-dashed border-slate-800 rounded-[3rem] flex flex-col items-center justify-center p-12 text-center bg-slate-800/10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 text-slate-800 mb-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.58 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.58 4 8 4s8-1.79 8-4M4 7c0-2.21 3.58-4 8-4s8 1.79 8 4m0 5c0 2.21-3.58 4-8 4s-8-1.79-8-4" /></svg>
                    <h3 class="text-2xl font-bold text-slate-700">Consola Lista</h3>
                    <p class="text-slate-500 mt-2 max-w-sm">Los resultados aparecerán aquí tras el cálculo.</p>
                </div>

                <div id="resultContent" class="hidden space-y-6 animate-fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Matriz L -->
                        <div class="bg-slate-800/40 p-6 rounded-[2rem] border border-slate-700/30 shadow-lg">
                            <h3 class="text-cyan-400 font-black text-[10px] uppercase mb-6 flex items-center justify-between">Matriz L (Lower)</h3>
                            <div id="displayL" class="overflow-auto custom-scrollbar"></div>
                        </div>
                        <!-- Matriz U -->
                        <div class="bg-slate-800/40 p-6 rounded-[2rem] border border-slate-700/30 shadow-lg">
                            <h3 class="text-blue-400 font-black text-[10px] uppercase mb-6 flex items-center justify-between">Matriz U (Upper)</h3>
                            <div id="displayU" class="overflow-auto custom-scrollbar"></div>
                        </div>
                    </div>

                    <!-- Solución de Variables -->
                    <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                        <h3 class="font-black text-xl text-white mb-8 flex items-center gap-3">
                            <div class="w-2 h-8 bg-cyan-500 rounded-full"></div>
                            Vector Solución (x)
                        </h3>
                        <div id="displayX" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3"></div>
                    </div>

                    <!-- Log de Pasos -->
                    <div class="bg-slate-800/20 p-6 rounded-3xl border border-slate-700/20">
                        <h3 class="text-xs font-black text-slate-500 uppercase mb-4 tracking-widest">Pasos del Proceso</h3>
                        <div id="displaySteps" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-20 text-center text-slate-600 text-xs border-t border-slate-800 pt-8 pb-4">
            <p>Calculadora de Factorización Matricial nxn — Ingeniería 2024</p>
        </footer>
    </div>

    <script>
        let currentMethod = 'doolittle';
        let currentSize = 3;

        const sizeInput = document.getElementById('matrixSize');
        const matrixContainer = document.getElementById('matrixContainer');
        const vectorContainer = document.getElementById('vectorContainer');
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        // Inicializar
        window.onload = () => createMatrixInputs(3);

        sizeInput.addEventListener('change', (e) => {
            let val = parseInt(e.target.value);
            if (val < 2) val = 2;
            if (val > 10) val = 10;
            currentSize = val;
            createMatrixInputs(val);
        });

        function setMethod(method) {
            currentMethod = method;
            document.querySelectorAll('.method-btn').forEach(btn => {
                btn.classList.remove('bg-cyan-500', 'text-white');
                btn.classList.add('text-slate-500', 'hover:bg-slate-700');
            });
            const active = document.getElementById(`btn-${method}`);
            active.classList.add('bg-cyan-500', 'text-white');
            active.classList.remove('text-slate-500', 'hover:bg-slate-700');
        }

        function createMatrixInputs(n) {
            // Guardar valores previos
            const oldValues = {};
            document.querySelectorAll('.matrix-input').forEach(input => {
                oldValues[input.id] = input.value;
            });

            // Grid A
            matrixContainer.innerHTML = '';
            const grid = document.createElement('div');
            grid.className = 'inline-grid gap-2';
            grid.style.gridTemplateColumns = `repeat(${n}, minmax(60px, 1fr))`;
            
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.id = `a-${i}-${j}`;
                    input.placeholder = '-';
                    input.className = 'matrix-input w-full h-12 text-center border-2 border-slate-700 rounded-xl font-mono text-sm text-white';
                    input.value = oldValues[input.id] || '';
                    grid.appendChild(input);
                }
            }
            matrixContainer.appendChild(grid);

            // Vector B
            vectorContainer.innerHTML = '';
            for (let i = 0; i < n; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.id = `b-${i}`;
                input.placeholder = '-';
                input.className = 'matrix-input min-w-[60px] flex-1 h-12 text-center border-2 border-slate-700 rounded-xl font-mono text-sm text-cyan-400';
                input.value = oldValues[input.id] || '';
                vectorContainer.appendChild(input);
            }
            hideResults();
        }

        function resetInputs() {
            document.querySelectorAll('.matrix-input').forEach(input => input.value = '');
            hideResults();
        }

        function hideResults() {
            document.getElementById('emptyState').classList.remove('hidden');
            document.getElementById('resultContent').classList.add('hidden');
            errorDiv.classList.add('hidden');
        }

        function calculate() {
            const n = currentSize;
            let A = Array(n).fill(0).map((_, i) => Array(n).fill(0).map((_, j) => parseFloat(document.getElementById(`a-${i}-${j}`).value) || 0));
            let B = Array(n).fill(0).map((_, i) => parseFloat(document.getElementById(`b-${i}`).value) || 0);
            
            let L = Array(n).fill(0).map(() => Array(n).fill(0));
            let U = Array(n).fill(0).map(() => Array(n).fill(0));
            let steps = [];

            try {
                errorDiv.classList.add('hidden');

                if (currentMethod === 'cholesky') {
                    // Validar simetría
                    for (let i = 0; i < n; i++) {
                        for (let j = 0; j < n; j++) {
                            if (Math.abs(A[i][j] - A[j][i]) > 1e-9) throw new Error("Cholesky: La matriz debe ser simétrica.");
                        }
                    }
                    for (let i = 0; i < n; i++) {
                        for (let j = 0; j <= i; j++) {
                            let sum = 0;
                            for (let k = 0; k < j; k++) sum += L[i][k] * L[j][k];
                            if (i === j) {
                                let val = A[i][i] - sum;
                                if (val <= 0) throw new Error("La matriz no es definida positiva.");
                                L[i][j] = Math.sqrt(val);
                            } else {
                                L[i][j] = (A[i][j] - sum) / L[j][j];
                            }
                        }
                    }
                    U = L.map((row, i) => row.map((_, j) => L[j][i]));
                    steps.push("Descomposición completada usando el algoritmo de Cholesky.");
                } 
                else if (currentMethod === 'doolittle') {
                    for (let i = 0; i < n; i++) L[i][i] = 1;
                    for (let i = 0; i < n; i++) {
                        for (let k = i; k < n; k++) {
                            let sum = 0;
                            for (let j = 0; j < i; j++) sum += (L[i][j] * U[j][k]);
                            U[i][k] = A[i][k] - sum;
                        }
                        for (let k = i + 1; k < n; k++) {
                            let sum = 0;
                            for (let j = 0; j < i; j++) sum += (L[k][j] * U[j][i]);
                            if (Math.abs(U[i][i]) < 1e-12) throw new Error("Error: División por cero (pivote nulo en diagonal de U).");
                            L[k][i] = (A[k][i] - sum) / U[i][i];
                        }
                        steps.push(`Paso ${i+1}: Fila de U y columna de L procesadas.`);
                    }
                } 
                else if (currentMethod === 'crout') {
                    for (let i = 0; i < n; i++) U[i][i] = 1;
                    for (let j = 0; j < n; j++) {
                        for (let i = j; i < n; i++) {
                            let sum = 0;
                            for (let k = 0; k < j; k++) sum += L[i][k] * U[k][j];
                            L[i][j] = A[i][j] - sum;
                        }
                        for (let i = j + 1; i < n; i++) {
                            let sum = 0;
                            for (let k = 0; k < j; k++) sum += L[j][k] * U[k][i];
                            if (Math.abs(L[j][j]) < 1e-12) throw new Error("Error: División por cero (pivote nulo en diagonal de L).");
                            U[j][i] = (A[j][i] - sum) / L[j][j];
                        }
                        steps.push(`Iteración ${j+1}: Columna de L y fila de U determinadas.`);
                    }
                }

                // Resolver Ly = b
                let y = Array(n).fill(0);
                for (let i = 0; i < n; i++) {
                    let sum = 0;
                    for (let j = 0; j < i; j++) sum += L[i][j] * y[j];
                    y[i] = (B[i] - sum) / L[i][i];
                }

                // Resolver Ux = y
                let x = Array(n).fill(0);
                for (let i = n - 1; i >= 0; i--) {
                    let sum = 0;
                    for (let j = i + 1; j < n; j++) sum += U[i][j] * x[j];
                    x[i] = (y[i] - sum) / U[i][i];
                }

                displayResults(L, U, x, steps);

            } catch (err) {
                errorText.innerText = err.message;
                errorDiv.classList.remove('hidden');
            }
        }

        function displayResults(L, U, x, steps) {
            document.getElementById('emptyState').classList.add('hidden');
            const res = document.getElementById('resultContent');
            res.classList.remove('hidden');

            const n = currentSize;
            const format = n => Math.abs(n) < 1e-10 ? "0" : (Number.isInteger(n) ? n : n.toFixed(4));

            // Render L
            let htmlL = `<div class="inline-grid gap-1 min-w-full" style="grid-template-columns: repeat(${n}, minmax(50px, 1fr))">`;
            L.forEach((row, i) => row.forEach((v, j) => {
                const active = i === j ? 'bg-cyan-500/20 text-cyan-400 font-bold' : 'text-slate-400';
                htmlL += `<div class="p-2 text-center font-mono text-xs rounded-lg ${active}">${format(v)}</div>`;
            }));
            document.getElementById('displayL').innerHTML = htmlL + '</div>';

            // Render U
            let htmlU = `<div class="inline-grid gap-1 min-w-full" style="grid-template-columns: repeat(${n}, minmax(50px, 1fr))">`;
            U.forEach((row, i) => row.forEach((v, j) => {
                const active = i === j ? 'bg-blue-500/20 text-blue-400 font-bold' : 'text-slate-400';
                htmlU += `<div class="p-2 text-center font-mono text-xs rounded-lg ${active}">${format(v)}</div>`;
            }));
            document.getElementById('displayU').innerHTML = htmlU + '</div>';

            // Render X
            let htmlX = '';
            x.forEach((v, i) => {
                htmlX += `
                    <div class="flex items-center gap-4 bg-cyan-500/10 p-3 rounded-xl border border-cyan-500/30">
                        <span class="text-cyan-400 font-mono text-[10px] font-bold">x${i+1}</span>
                        <span class="text-cyan-50 font-mono font-bold">${format(v)}</span>
                    </div>
                `;
            });
            document.getElementById('displayX').innerHTML = htmlX;

            // Render Steps
            let htmlSteps = '';
            steps.forEach(s => {
                htmlSteps += `
                    <div class="step-card flex gap-4 items-center p-2 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-cyan-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                        <p class="text-[11px] font-mono text-slate-400">${s}</p>
                    </div>
                `;
            });
            document.getElementById('displaySteps').innerHTML = htmlSteps;
        }
    </script>
</body>
</html>
